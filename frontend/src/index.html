<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>

<body>

	<!-- upload file -->
	<div id="calc-checkpoints-managment">
		<div id="import-file-area">
			<h2>Checkpoint and Wating time Management</h2>
			<form action="" id="form">
				<div id="browse-wrapper">
					<input type="file" id="file" style="display: none;" accept=".csv">
					<button type="button" class="button" id="uploadTrigger"><h3>Browse →</h3></button>
					<span id="file-name">No file selected</span>
				</div>
				<button type="submit" id="submit">Upload File</button>
			</form>
		</div>
		<div id="chart-results">
			<canvas id="myChart"></canvas>
		</div>
		<div id="input-config">
			<div id="max-wait">
				<label>Maximum waiting time in minutes</label>
				<input type="text" id="input-max-wait-time">
				<button type="submit" id="submit-max-wait-time">✓</button>
			</div>
			<div id="result-interval">
				<label>Result interval in minutes</label>
				<input type="text" id="input-result-interval">
				<button type="submit" id="submit-result-interval">✓</button>
			</div>
			<div id="time-per-passenger">
				<label>Time per passenger in seconds</label>
				<input type="text" id="input-time-per-passenger">
				<button type="submit" id="submit-time-per-passenger">✓</button>
			</div>
			<div id="max-checkpoints">
				<label>Max checkpoints</label>
				<input type="text" id="input-max-checkpoints">
				<button type="submit" id="submitMaxCheckpoints">✓</button>
			</div>
		</div>
	</div>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
	<script type=module src="main.js"></script>
</body>
</html>
