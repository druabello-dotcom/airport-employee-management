<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>

<body>

	<!-- upload file -->
	<div id="checkpoints-managment">
	<h2>Checkpoint and wating time management</h2>
		<div id="calc-checkpoints-managment">
			<div id="chart-section">
				<div id="import-file-area">
					<form action="" id="form">
						<div id="browse-wrapper">
							<input type="file" id="file" style="display: none;" accept=".csv">
							<button type="button" class="button" id="uploadTrigger"><h3>Browse →</h3></button>
							<span id="file-name">No file selected</span>
						</div>
						<button type="submit" id="submit"><h3>Upload File</h3></button>
					</form>
				</div>
				<div id="chart-results">
					<canvas id="myChart"></canvas>
				</div>
			</div>
			<div id="input-defaultConfig-section">
				<div id="max-wait" class="input-defaultConfig-container">
					<div id="display-max-wating-time-value" class="display-config-values">
						<label>Maximum waiting time in minutes:</label>
						<label id="max-wait-time-value"></label>
					</div>
					<input type="text" id="input-max-wait-time">
					<button class="update-config-button" type="submit" id="submit-max-wait-time">✓</button>
				</div>
				<div id="result-interval" class="input-defaultConfig-container">
					<div class="display-config-values" id="display-result-interval-value">
						<label>Result interval in minutes:</label>
						<label id="result-interval-value"></label>
					</div>
					<input type="text" id="input-result-interval">
					<button class="update-config-button" type="submit" id="submit-result-interval">✓</button>
				</div>
				<div id="time-per-passenger" class="input-defaultConfig-container">
					<div class="display-config-values" id="display-time-per-passenger-value">
						<label>Time per passenger in seconds:</label>
						<label id="time-per-passenger-value"></label>
					</div>
					<input type="text" id="input-time-per-passenger">
					<button class="update-config-button" type="submit" id="submit-time-per-passenger">✓</button>
				</div>
				<div id="max-checkpoints" class="input-defaultConfig-container">
					<div class="display-config-values" id="display-max-checkpoints-value">
						<label>Max checkpoints:</label>
						<label id="max-checkpoints-value"></label>
					</div>
					<input type="text" id="input-max-checkpoints">
					<button class="update-config-button" type="submit" id="submitMaxCheckpoints">✓</button>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
	<script type=module src="main.js"></script>
</body>
</html>
